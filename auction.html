<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VSV Cricket Auction</title>
    <meta
      name="description"
      content="A cricket player auction board with teams, bids, and admin controls."
    />
    <link rel="icon" href="public/favicon.svg" />
    <link rel="stylesheet" href="styles.css?v=20260721-04" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=20260721-04"></script>
    <script src="app.js?v=20260721-04" defer></script>
  </head>
  <body data-page="auction">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="teams.html" aria-label="VSV Auction home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <span class="eyebrow">Cricket player auction</span>
            <strong>VSV Auction Room</strong>
          </span>
        </a>
        <a class="header-center-logo" href="teams.html" aria-label="VSV Auction home">
          <img alt="VSV logo" src="public/vsv-logo.png" />
        </a>
        <nav class="nav">
          <a class="nav-link" href="teams.html">Teams</a>
          <a class="nav-link" href="womens-team.html">Women's Team</a>
          <a class="nav-link" href="players.html">Players</a>
          <a class="nav-link active" href="auction.html">Auction</a>
          <a class="nav-link" href="admin.html">Admin</a>
          <a class="nav-link" href="login.html">Login</a>
        </nav>
      </div>
    </header>

    <main class="auction-page">
      <section class="auction-stage" aria-label="Current auction lot">
        <div class="stage-image">
          <img id="current-player-image" class="stage-player-photo" alt="Current cricket player" />
          <span id="current-player-id-badge" class="stage-player-id-badge"></span>
          <div class="stage-overlay"></div>
          <div class="stage-caption">
            <span class="eyebrow light">Current lot</span>
            <h1 id="current-player-name">Loading player</h1>
            <p id="current-player-summary"></p>
          </div>
        </div>
        <div class="stage-panel">
          <div class="lot-metrics">
            <article class="metric compact">
              <span>Base price</span>
              <strong id="current-base">₹ 0</strong>
            </article>
            <article class="metric compact">
              <span>Current bid</span>
              <strong id="current-bid">₹ 0</strong>
            </article>
            <article class="metric compact">
              <span>Leading team</span>
              <strong id="current-leading">Open</strong>
            </article>
          </div>
          <div>
            <h2 class="panel-title">Place bid as team</h2>
            <div id="team-bid-buttons" class="team-bid-grid"></div>
          </div>
        </div>
      </section>

      <section class="auction-support-grid" aria-label="Auction details">
        <section class="teams-column">
          <h2 class="side-title">Teams</h2>
          <div id="team-list" class="stack"></div>
        </section>
        <section class="metric-row auction-summary-row" aria-label="Auction summary">
          <article class="metric">
            <span>Players sold</span>
            <strong id="metric-sold">0</strong>
          </article>
          <article class="metric">
            <span>Auction purse</span>
            <strong id="metric-purse">₹ 0</strong>
          </article>
          <article class="metric">
            <span>Total spent</span>
            <strong id="metric-spent">₹ 0</strong>
          </article>
        </section>
        <section class="next-panel">
          <h2 class="side-title">Next available</h2>
          <div id="next-players" class="available-player-list"></div>
        </section>
        <section>
          <h2 class="side-title">Recent bids</h2>
          <div id="recent-bids" class="activity-list"></div>
        </section>
      </section>
    </main>

    <dialog id="sold-player-dialog" class="edit-dialog sold-player-dialog">
      <div class="edit-dialog-card sold-player-card">
        <div class="dialog-header">
          <div>
            <span class="eyebrow">Sold</span>
            <h2 id="sold-player-title">Player sold</h2>
            <p id="sold-player-subtitle"></p>
          </div>
          <button class="secondary-button compact-button" data-sold-dialog-close type="button">
            Close
          </button>
        </div>
        <div id="sold-player-summary" class="sold-player-summary"></div>
      </div>
    </dialog>
  </body>
</html>
